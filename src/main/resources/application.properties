spring.application.name=coffeebara
server.port=18080
spring.profiles.active=local
spring.sql.init.mode=always

kakao.local.base-url=https://dapi.kakao.com
app.auth.frontend-base-url=http://localhost:3000
app.search-cache.ttl-seconds=10
app.search-cache.max-entries=200
app.rate-limit.window-seconds=30
app.rate-limit.search-max-requests=20
app.rate-limit.map-max-requests=20
app.rate-limit.save-max-requests=6
app.rate-limit.detail-max-requests=30
app.rate-limit.max-tracked-keys=2000
app.cors.allowed-origins=http://localhost:3000
app.media.storage-root=${APP_MEDIA_STORAGE_ROOT:E:/storage}
app.media.upload.max-files-per-request=5
app.media.upload.max-attachments-per-record=5
app.media.upload.max-attachments-per-view-spot-record=30
app.media.upload.max-file-size-bytes=15728640
app.media.upload.max-request-size-bytes=104857600
mybatis.mapper-locations=classpath:/mapper/*.xml
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=100MB
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-id=${kakao.local.rest-api-key:}
spring.security.oauth2.client.registration.kakao.client-authentication-method=none
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image
spring.security.oauth2.client.registration.kakao.provider=kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
